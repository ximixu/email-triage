accounts:
  - name: personal_outlook
    provider: microsoft
    host: outlook.office365.com
    user: someon@outlook.com
    junk_folder: Junk
  - name: personal_gmail
    provider: google
    host: imap.gmail.com
    user: someone@gmail.com
    junk_folder: "[Gmail]/Spam"

categories:
  - name: important
    description: "Personal emails, work-related, bills, legal documents"
    action: mark_read
  - name: marketing
    description: "Promotions, newsletters, sales offers, marketing"
    action: mark_read
  - name: junk
    description: "Spam, phishing, unsolicited bulk mail"
    action: move_to_junk
  - name: other
    description: "Anything that doesn't clearly fit the above"
    action: mark_read
