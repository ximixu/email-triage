- name: critical
  description: "Urgent emails that require immediate attention, such as security alerts, account breaches, or critical work-related messages. Double-check for authenticity, especially if they claim to be from known contacts or brands."
  action: mark_unread
- name: important
  description: "Personal emails, work-related, bills, legal documents. Emails that are important but don't require immediate action."
  action: mark_read
- name: social
  description: "Social media notifications, friend updates, event invitations."
  action: mark_read
- name: updates
  description: "Order confirmations, receipts, account statements, shipping notifications."
  action: mark_read
- name: marketing
  description: "Promotions, newsletters, sales offers, marketing."
  action: mark_read
- name: junk
  description: "Spam, phishing, unsolicited bulk mail. Keep an eye out for domains impersonating known contacts or brands, and be cautious of emails with urgent language or requests for personal information."
  action: move_to_junk
- name: other
  description: "Anything that doesn't clearly fit the above"
  action: mark_read
